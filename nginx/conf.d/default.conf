server {
    listen 8080 default_server;

    root /apps/meritokrat/www;
    index index.php
        server.php
        imageserver.php
        staticserver.php;

    location / {
        try_files $uri $uri/ @rewrite_rules;
    }

    location @rewrite_rules {

        if ( $host ~ ^meritokrat\.org$ ) {
            #rewrite ^/.* maintain.php last;
            rewrite ^/phpinfo /phpinfo.php last;
            rewrite ^/donate /index.php?module=help&action=index&zbir_koshtiv_vybory_2012 last;
            rewrite ^/static/(.*)$ /static/$1 break;
            rewrite ^/uploads/tinymce/(.*)$ /uploads/tinymce/$1 break;
            #rewrite ^/kW3EeT6Y_rW2pkU7YljR76_nJer2Ei-MSpk8veIiv9DFnHont3-2Th/(.*)$ /phppgadmin/$1 last;
            rewrite ^/download/(.*)$ /files/$1 break;
            rewrite ^/zz/app$ /zz-app/www/index.html break;
            rewrite ^\/zz\/([^\?]+)\??.*$ /zz-app/www/$1 break;
            rewrite ^/zz/.*\?.*$ /zz-app/www/empty.json break;
            rewrite ^/.*\.(css|js|dll)\??.*$ /static/empty break;
            rewrite ^/house\-([0-9]+)$ /index.php?module=house&action=view&hid=$1 last;
            rewrite ^/house/create$ /index.php?module=house&action=create last;
            rewrite ^/houses$ /index.php?module=house&action=index last;
            rewrite ^\/api\/([^/]+)\/([^\?/]+)\??(.*)$ /index.php?module=api&action=$1&direction=$2&$3 last;
            rewrite ^\/api\/([^/]+)\/([^/]+)$ /index.php?module=api&action=$1&direction=$2 last;
            rewrite ^/profile\-([0-9]*)$ /index.php?module=profile&action=index&id=$1 last;
            rewrite ^/profile\-([0-9]*)\?(.*)$ /index.php?module=profile&action=index&id=$1&$2 last;
            rewrite ^/docs\/([a-z0-9]+)$ /index.php?module=docs&action=view&alias=$1 last;
            rewrite ^/docs\/([a-z0-9]+)\?(.*)$ /index.php?module=docs&action=view&alias=$1&$2 last;
            rewrite ^/blog\-([0-9]*)$ /index.php?module=blogs&action=user&user_id=$1 last;
            rewrite ^/blog\-([0-9]*)(.*)page=([0-9]*)$ /index.php?module=blogs&action=user&user_id=$1&page=$3 last;
            rewrite ^/blogpost([0-9]*)$ /index.php?module=blogs&action=post&id=$1 last;
            rewrite ^/idea([0-9]*)$ /index.php?module=ideas&action=view&id=$1 last;
            rewrite ^/poll([0-9]*)$ /index.php?module=polls&action=view&id=$1 last;
            rewrite ^/polls\-([0-9]*)$ /index.php?module=polls&action=user&user_id=$1 last;
            rewrite ^/polls\-([0-9]*)\?(.*)$ /index.php?module=polls&action=user&user_id=$1&$2 last;
            rewrite ^/group([0-9]*)$ /index.php?module=groups&action=view&id=$1 last;
            rewrite ^/project/(.*)$ /index.php?module=reform&action=view&symlink=$1 last;
            rewrite ^/project([0-9]+)/.*$ /index.php?module=reform&action=view&id=$1 last;
            rewrite ^/projects/(.*)\?(.*)$ /index.php?module=reform&action=$1&$2 last;
            rewrite ^/projects/(.*)$ /index.php?module=reform&action=$1 last;
            rewrite ^/projects$ /index.php?module=reform&action=index last;
            rewrite ^/shop$ /index.php?module=shop&action=index&view=categories last;
            rewrite ^/shop/buy/edit /index.php?module=shop&action=buy&act=edit last;
            rewrite ^/shop/buy /index.php?module=shop&action=buy last;
            rewrite ^/shop/(.*)$ /index.php?module=shop&action=index&category=$1&view=items last;
            rewrite ^/shop/(.*)/(.*)$ /index.php?module=shop&action=index&category=$1&item=$2view=item last;
            rewrite ^/team([0-9]+)/.*$ /index.php?module=team&action=view&id=$1 last;
            rewrite ^/ppo([0-9]+)/.*$ /index.php?module=ppo&action=view&id=$1 last;
            rewrite ^/vnesky/bank /index.php?module=vnesky&action=pay&way=bank last;
            rewrite ^/vnesky/interkassa /index.php?module=vnesky&action=pay&way=interkassa last;
            rewrite ^/vnesky/liqpay /index.php?module=vnesky&action=pay&way=liqpay last;
            rewrite ^/vnesky/privat /index.php?module=vnesky&action=pay&way=privat last;
            rewrite ^/event([0-9]*)$ /index.php?module=events&action=view&id=$1 last;
            #rewrite ^/events/arhive(.*)$ /index.php?module=events&action=index&mode=arhive$1 last;
            #rewrite ^/events/mine/(.*)$ /index.php?module=events&action=index&mode=mine&act=$1 last;
            #rewrite ^/events/mine$ /index.php?module=events&action=index&mode=mine last;
            rewrite ^/leadergroup([0-9]*)$ /index.php?module=leadergroups&action=view&id=$1 last;
            rewrite ^/photocompetition/([0-9]*)$ /index.php?module=photocompetition&action=view&id=$1 last;
            rewrite ^/help/index\?poryadok_splaty_vneskiv /index.php?module=vnesky last;
            rewrite ^/([^/?.]+)(\?(.*))?$ /index.php?module=$1&$3 last;
            rewrite ^/([^/.]+)/([^/]+)/([^/\?]*)\??(.*)$ /index.php?module=$1_$2&action=$3&$4 last;
            rewrite ^/([^/.]+)/([^/\?]*)\??(.*)$ /index.php?module=$1&action=$2&$3 last;
            rewrite ^/(.+\.ico)$ /static/images/$1 break;
            rewrite ^/(.+\.xml)$ /$1 break;
            rewrite ^/(.+\.txt)$ /$1 break;
        }

        if ( $host ~ ^s1\.meritokrat\. ) {
            rewrite ^/([^\.]+)\.css\??(.*)$ /staticserver.php?g=$1_css&$2 last;
            rewrite ^/([^\.]+)\.js\??(.*)$ /staticserver.php?g=$1_js&$2 last;
            rewrite ^/(.+\.gif)$ /static/images/$1 break;
            rewrite ^/(.+\.jpg)$ /static/images/$1 break;
            rewrite ^/(.+\.png)$ /static/images/$1 break;
        }

        if ( $host ~ ^f\.meritokrat\. ) {
            rewrite ^/(.*)$ /server.php?q=$1 last;
        }

        if ( $host ~ ^image\.meritokrat\. ) {
            rewrite ^/(.*)$ /imageserver.php?q=$1 last;
        }
    }

    location ~ \.php$ {
        # split path
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # 404
        try_files $fastcgi_script_name =404;

        # default fastcgi_params
        include fastcgi_params;

        # fastcgi settings
        fastcgi_pass		 meritokrat-php56:9000;
        #fastcgi_index		 index.php;
        fastcgi_buffers		 8 16k;
        fastcgi_buffer_size	 32k;
        fastcgi_read_timeout 600;

        # fastcgi params
        #fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO	      $fastcgi_path_info;
        fastcgi_param SERVER_NAME     meritokrat.org;
        fastcgi_param FRAMEWORK_PATH  /apps/meritokrat/framework;
        fastcgi_param ENVIRONMENT     prod;
        fastcgi_param LANGUAGE        ua;
    }
}
